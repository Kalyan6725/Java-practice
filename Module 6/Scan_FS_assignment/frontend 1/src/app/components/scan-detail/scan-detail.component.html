<div class="container mt-4">
  <a routerLink="/scans" class="btn btn-secondary" style="margin-bottom: 1.5rem;">&larr; Back to List</a>

  @if (error()) {
    <div class="alert alert-danger">{{ error() }}</div>
  }

  @if (loading()) {
    <app-loading message="Loading scan details..."></app-loading>
  } @else if (scan()) {
    <div class="classic-card">
      <div class="classic-card-header">
        <h4 style="margin: 0;">Scan Details - #{{ scan()!.id }}</h4>
      </div>
      <div class="classic-card-body">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
          <div>
            <dl style="display: grid; grid-template-columns: 180px 1fr; gap: 10px; margin: 0;">
              <dt style="font-weight: bold; color: #2c3e50;">Domain Name</dt>
              <dd style="margin: 0;">{{ scan()!.domainName }}</dd>

              <dt style="font-weight: bold; color: #2c3e50;">Number of Pages</dt>
              <dd style="margin: 0;">{{ scan()!.numPages }}</dd>

              <dt style="font-weight: bold; color: #2c3e50;">Broken Links</dt>
              <dd style="margin: 0;">
                <span [class]="scan()!.numBrokenLinks > 0 ? 'badge badge-warning' : 'badge badge-success'">
                  {{ scan()!.numBrokenLinks }}
                </span>
              </dd>

              <dt style="font-weight: bold; color: #2c3e50;">Missing Images</dt>
              <dd style="margin: 0;">
                <span [class]="scan()!.numMissingImages > 0 ? 'badge badge-warning' : 'badge badge-success'">
                  {{ scan()!.numMissingImages }}
                </span>
              </dd>
            </dl>
          </div>
        </div>
      </div>
    </div>
  }
</div>
