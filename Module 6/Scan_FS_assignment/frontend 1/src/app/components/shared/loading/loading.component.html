<div style="display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 3rem 0;">
  <div style="border: 4px solid #f3f3f3; border-top: 4px solid #2980b9; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
  <p style="margin-top: 1rem; color: #7f8c8d; font-family: Georgia, serif;">{{ message }}</p>

  0% { transform: rotate(0deg); }

}
</style>
