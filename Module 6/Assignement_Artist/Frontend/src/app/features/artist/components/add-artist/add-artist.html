<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          <h2 class="mb-0">Add New Artist</h2>
        </div>
        <div class="card-body p-4">
          <form #artistForm="ngForm" (ngSubmit)="onSubmit(artistForm)">
            <div class="mb-3">
              <label for="firstName" class="form-label">First Name</label>
              <input 
                type="text" 
                class="form-control" 
                id="firstName" 
                name="firstName" 
                placeholder="Enter first name" 
                [(ngModel)]="firstName" 
                required 
                #firstNameField="ngModel"
                [class.is-invalid]="firstNameField.invalid && firstNameField.touched">
              @if(firstNameField.invalid && firstNameField.touched){
                <div class="invalid-feedback">
                  First Name is required.
                </div>
              }
            </div>

            <div class="mb-3">
              <label for="lastName" class="form-label">Last Name</label>
              <input 
                type="text" 
                class="form-control" 
                id="lastName" 
                name="lastName" 
                placeholder="Enter last name" 
                [(ngModel)]="lastName" 
                required 
                #lastNameField="ngModel"
                [class.is-invalid]="lastNameField.invalid && lastNameField.touched">
              @if(lastNameField.invalid && lastNameField.touched){
                <div class="invalid-feedback">
                  Last Name is required.
                </div>
              }
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-fill" [disabled]="!artistForm.valid">
                <i class="bi bi-plus-circle"></i> Add Artist
              </button>
              <a routerLink="/" class="btn btn-secondary flex-fill">
                <i class="bi bi-x-circle"></i> Cancel
              </a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
