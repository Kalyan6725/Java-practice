<div class="modal fade show d-block" tabindex="-1" style="background: rgba(0,0,0,0.5);" role="dialog">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Employee Profile</h5>
        <button type="button" class="btn-close btn-close-white" (click)="close.emit()"></button>
      </div>
      @if (employee) {
      <div class="modal-body">
        <p class="text-muted small mb-3">Endpoint Target: <code>GET /employees/getById/{{employee.id}}</code></p>
        <div class="list-group list-group-flush">
          <div class="list-group-item d-flex justify-content-between py-2">
            <span class="text-muted fw-semibold">Employee ID:</span>
            <span class="fw-bold">{{employee.id}}</span>
          </div>
          <div class="list-group-item d-flex justify-content-between py-2">
            <span class="text-muted fw-semibold">Name:</span>
            <span>{{employee.name}}</span>
          </div>
          <div class="list-group-item d-flex justify-content-between py-2">
            <span class="text-muted fw-semibold">Email:</span>
            <span class="text-primary text-decoration-underline">{{employee.email}}</span>
          </div>
        </div>
      </div>
    }
      <div class="modal-footer bg-light">
        <button type="button" class="btn btn-secondary btn-sm" (click)="close.emit()">Close</button>
      </div>
    </div>
  </div>
</div>
