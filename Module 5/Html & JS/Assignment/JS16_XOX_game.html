<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>XOX Game</title>
	<style>
		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			background: #f3f4f6;
			font-family: Arial, sans-serif;
			gap: 14px;
		}

		.status {
			font-size: 1.1rem;
			font-weight: 700;
			color: #111827;
		}

		.board {
			display: grid;
			grid-template-columns: repeat(3, 100px);
			grid-template-rows: repeat(3, 100px);
			gap: 8px;
		}

		.cell {
			border: 2px solid #222;
			background: #fff;
			display: flex;
			align-items: center;
			justify-content: center;
			font-size: 2rem;
			font-weight: 700;
			cursor: pointer;
			user-select: none;
		}

		.cell.winner {
			background: #bbf7d0;
			border-color: #166534;
		}
	</style>
</head>
<body>
	<div class="status" id="status">Turn: X</div>
	<div class="board" id="board">
		<div class="cell"></div>
		<div class="cell"></div>
		<div class="cell"></div>
		<div class="cell"></div>
		<div class="cell"></div>
		<div class="cell"></div>
		<div class="cell"></div>
		<div class="cell"></div>
		<div class="cell"></div>
	</div>

	<script>
		const cells = document.querySelectorAll('.cell');
		const statusText = document.getElementById('status');
		let cnt = 0;
		let gameOver = false;

		const winPatterns = [
			[0, 1, 2],
			[3, 4, 5],
			[6, 7, 8],
			[0, 3, 6],
			[1, 4, 7],
			[2, 5, 8],
			[0, 4, 8],
			[2, 4, 6]
		];

		function checkWinner() {
			for (const pattern of winPatterns) {
				const [a, b, c] = pattern;
				const v1 = cells[a].textContent;
				const v2 = cells[b].textContent;
				const v3 = cells[c].textContent;

				if (v1 !== '' && v1 === v2 && v2 === v3) {
					cells[a].classList.add('winner');
					cells[b].classList.add('winner');
					cells[c].classList.add('winner');
					return v1;
				}
			}

			return null;
		}

		cells.forEach((cell) => {
			cell.addEventListener('click', () => {
				if (cell.textContent !== '' || gameOver) {
					return;
				}

				const currentPlayer = cnt % 2 === 0 ? 'X' : 'O';
				cell.textContent = currentPlayer;

				const winner = checkWinner();
				if (winner) {
					statusText.textContent = `Winner: ${winner}`;
					gameOver = true;
					return;
				}

				cnt++;

				if (cnt === 9) {
					statusText.textContent = 'Game Draw';
					gameOver = true;
					return;
				}

				statusText.textContent = `Turn: ${cnt % 2 === 0 ? 'X' : 'O'}`;
			});
		});
	</script>
</body>
</html>
