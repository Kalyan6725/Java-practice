<!DOCTYPE html>
<html>
<head>
    <title>JS13_Highlight_On_Click</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #e3f2fd, #f1f8e9);
        }

        .player-card {
            border: 0;
            border-radius: 1rem;
            overflow: hidden;
        }

        .player-btn {
            width: 100%;
            padding: 0.9rem 1rem;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .player-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(0, 0, 0, 0.15);
        }

        .highlighted {
            background-color: #ffeb3b !important;
            color: #212529 !important;
            border-color: #fdd835 !important;
            box-shadow: 0 0 0 0.2rem rgba(255, 235, 59, 0.35) !important;
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <div class="card shadow-lg player-card">
                    <div class="card-body p-4 p-md-5">
                        <h1 class="h3 text-center mb-2">Indian Cricket Stars</h1>
                        <p class="text-center text-secondary mb-4">Focus on a button to highlight it.</p>

                        <div class="d-grid gap-3">
                            <button class="btn btn-primary player-btn" onfocus="highlight(this)" onblur="unhighlight(this)">Suresh Raina</button>
                            <button class="btn btn-danger player-btn" onfocus="highlight(this)" onblur="unhighlight(this)">Virat Kohli</button>
                            <button class="btn btn-success player-btn" onfocus="highlight(this)" onblur="unhighlight(this)">Rohit Sharma</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function highlight(button) {
            button.style.backgroundColor = "#ffeb3b";
            button.style.color = "#212529";
        }

        function unhighlight(button) {
            button.style.backgroundColor = "";
            button.style.color = "";
        }
    </script>
</body>
</html>
