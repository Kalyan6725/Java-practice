<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>JS14 Navigation</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f8f9fa;
		}

		.main-box {
			max-width: 700px;
			margin: 40px auto;
		}

		.top-buttons button {
			margin-right: 8px;
			margin-bottom: 8px;
		}

		.top-buttons .active {
			background-color: #0d6efd;
			color: white;
		}

		.content-box {
			background-color: white;
			border: 1px solid #dee2e6;
			border-radius: 8px;
			padding: 20px;
		}

		.content-panel {
			display: none;
		}

		.content-panel.active {
			display: block;
		}
	</style>
</head>
<body>
	<div class="container main-box">

		<div class="top-buttons mb-3">
			<button id="btn-home" class="btn btn-outline-primary active" onclick="showSection('home', this)">Home</button>
			<button id="btn-main" class="btn btn-outline-primary" onclick="showSection('main', this)">Main</button>
			<button id="btn-contact" class="btn btn-outline-primary" onclick="showSection('contact', this)">Contact</button>
			<button id="btn-about" class="btn btn-outline-primary" onclick="showSection('about', this)">About</button>
		</div>

		<div class="content-box">
			<div class="content-panel active" id="home">
				<h4>Home</h4>
				<p>Welcome to Home section.</p>
			</div>

			<div class="content-panel" id="main">
				<h4>Main</h4>
				<p>This is Main section content.</p>
			</div>

			<div class="content-panel" id="contact">
				<h4>Contact</h4>
				<p>Email: abc@example.com</p>
				<p>Phone: 9876543210</p>
			</div>

			<div class="content-panel" id="about">
				<h4>About</h4>
				<p>This is About section content.</p>
			</div>
		</div>
	</div>

	<script>
		function showSection(sectionId, clickedButton) {
			const allPanels = document.getElementsByClassName("content-panel");
			for (let i = 0; i < allPanels.length; i++) {
				allPanels[i].classList.remove("active");
			}

			document.getElementById(sectionId).classList.add("active");

			const allButtons = document.querySelectorAll(".top-buttons button");
			for (let i = 0; i < allButtons.length; i++) {
				allButtons[i].classList.remove("active");
			}
			
			clickedButton.classList.add("active");
		}
	</script>
</body>
</html>
