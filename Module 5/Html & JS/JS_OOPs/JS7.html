<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>JavaScript OOPs</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <button onclick="demo()">Timeout</button>
        <div id="demo"></div>
        <script>
            //timeout
            function demo(){
                setTimeout(() => {
                    document.getElementById("demo").innerHTML = "Hello after 2 seconds";
                }, 2000);
            }
        </script>
    </body>
</html>
