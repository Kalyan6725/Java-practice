<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Async Example</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    </head>
    <body>
        <div class="container mt-5">
        <button class="btn btn-primary px-4 py-2" onclick="demo()">Async and Await</button>
        </div>
        <div class="container mt-3" id="demo"></div>
        <script>
            const mypromise = () => {
                return new Promise((resolve, reject) => {
                    console.log("promise started");
                    setTimeout(()=>{
                        console.log("inside setTimeout");
                        let answer= Math.round(Math.random());
                        if (answer == 0) {
                            resolve();
                        } else {
                            reject();
                        }
                    }, Math.random() * 10*1000);
                    console.log("promise ended");
                })
            }

            async function demo(){
                let result = "Loading...";
                document.getElementById("demo").innerHTML = `<h1>${result}</h1>`;
                result = await mypromise().then(
                    () => {
                    return "i will be resolved";
                }
                ).catch(
                    () => {
                    return "i will be rejected";
                }
                );
                document.getElementById("demo").innerHTML = `<h1>${result}</h1>`;
            }
        </script>
    </body>
</html>
