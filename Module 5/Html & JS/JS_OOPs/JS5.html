<!DOCTYPE html>
<html>
    <head>
        <title>jS5</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
    </head>
    <body>
        <button onclick="demo()">Async and Await</button>
        <div id="demo"></div>
        <script>
            //async and await
            function demo(){
                setTimeout( () => {
                    console.log("Inside setTimeout");
                    document.getElementById("demo").innerHTML = "<h1>Hello World</h1>";
                }, 2000);
                console.log("Exiting demo function");
            }
        </script>
    </body>
</html>
