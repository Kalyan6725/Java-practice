<div class="container mt-3" style="max-width: 600px;">
  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white py-2">
      <h5 class="mb-0">Add New Todo</h5>
    </div>
    <div class="card-body p-3">
      <form>
        <div class="row mb-2">
          <div class="col-md-6">
            <label for="todoId" class="form-label form-label-sm">ID</label>
            <input id="todoId" class="form-control form-control-sm" type="number" placeholder="Enter ID" [(ngModel)]="newTodo.id" name="id">
          </div>
          <div class="col-md-6">
            <label for="todoTitle" class="form-label form-label-sm">Title</label>
            <input id="todoTitle" class="form-control form-control-sm" type="text" placeholder="Enter title" [(ngModel)]="newTodo.title" name="title">
          </div>
        </div>
        
        <div class="mb-2">
          <label for="todoDescription" class="form-label form-label-sm">Description</label>
          <textarea id="todoDescription" class="form-control form-control-sm" rows="2" placeholder="Enter description" [(ngModel)]="newTodo.description" name="description"></textarea>
        </div>
        
        <div class="form-check mb-2">
          <input class="form-check-input" type="checkbox" [(ngModel)]="newTodo.completed" id="completedCheck" name="completed">
          <label class="form-check-label" for="completedCheck">
            Completed
          </label>
        </div>
        
        <button class="btn btn-primary btn-sm w-100" type="button" (click)="addTodo()">
          Add Todo
        </button>
      </form>
    </div>
  </div>
</div>
