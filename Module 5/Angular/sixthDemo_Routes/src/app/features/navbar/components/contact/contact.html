<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-lg-6">
      <h1 class="display-5 mb-4">Contact Us</h1>
      <div class="card shadow-sm">
        <div class="card-body">
          <form>
            <div class="mb-3">
              <label for="name" class="form-label">Your Name</label>
              <input type="text" class="form-control" id="name" placeholder="Enter your name">
            </div>
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
            <div class="mb-3">
              <label for="message" class="form-label">Message</label>
              <textarea class="form-control" id="message" rows="4" placeholder="Your message here..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Message</button>
          </form>
        </div>
      </div>
      <div class="mt-4">
        <div class="card">
          <div class="card-body">
            <h6 class="card-subtitle mb-3 text-muted">Get in Touch</h6>
            <p class="mb-2"><strong>📧 Email:</strong> support@employeeapp.com</p>
            <p class="mb-2"><strong>📱 Phone:</strong> +1 (555) 123-4567</p>
            <p class="mb-0"><strong>🏢 Address:</strong> 123 Tech Street, Silicon Valley, CA</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
