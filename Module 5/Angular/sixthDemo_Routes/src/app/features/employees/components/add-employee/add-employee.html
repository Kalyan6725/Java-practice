<div class="card shadow-sm">
  <div class="card-header bg-success text-white">
    <h5 class="mb-0">Add New Employee</h5>
  </div>
  <div class="card-body">
    <form class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" [(ngModel)]="employee.name" name="name" placeholder="Enter full name" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" [(ngModel)]="employee.email" name="email" placeholder="Enter email address" />
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <button type="button" class="btn btn-success w-100" (click)="addEmployee()">
          <i class="bi bi-plus-circle"></i> Add Employee
        </button>
      </div>
    </form>
  </div>
</div>
