<div class="card h-100 shadow-sm">
  <div class="card-body">
    <h5 class="card-title text-primary">{{employee.name}}</h5>
    <div class="mb-2">
      <span class="badge bg-secondary">ID: {{employee.id}}</span>
    </div>
    <p class="card-text">
      <i class="bi bi-envelope"></i> {{employee.email}}
    </p>
    @if(status.loading){
      <div class="text-center py-3">
        <div class="spinner-border text-danger" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-2 text-muted">Deleting...</p>
      </div>
    }
    @else if(status.error){
      <div class="alert alert-danger py-2 mb-2">{{status.error}}</div>
    }
    @else if(status.success){
      <div class="alert alert-success py-2 mb-2">Employee deleted successfully!</div>
    }
  </div>
  <div class="card-footer bg-transparent">
    <button class="btn btn-danger btn-sm w-100" (click)="DeleteEmp(employee.id)">
      <i class="bi bi-trash"></i> Delete
    </button>
  </div>
</div>
