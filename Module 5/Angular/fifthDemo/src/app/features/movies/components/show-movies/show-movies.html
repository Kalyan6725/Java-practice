<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
  @for (movie of movieService.getMovies()(); track movie.id) {
    <div class="col">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title text-primary">{{ movie.title }}</h5>
          <div class="card-text">
            <p class="mb-2"><strong>Director:</strong> {{ movie.director }}</p>
            <p class="mb-2"><strong>Lead Actor:</strong> {{ movie.leadActor }}</p>
            <p class="mb-0"><strong>Release Year:</strong> <span class="badge bg-secondary">{{ movie.releaseYear }}</span></p>
            <button type="button" class="btn btn-danger mt-3" (click)="movieService.deleteMovie(movie.id)">
              <i class="bi bi-trash"></i> Delete
            </button>
        </div>
        </div>
        <div class="card-footer bg-transparent">
          <small class="text-muted">ID: {{ movie.id }}</small>
        </div>
      </div>
    </div>
  }
</div>
