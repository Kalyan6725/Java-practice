<html>
    <head>
        <title>CSS</title>
        <style>
            h1.myh1 {
                color: rgba(240, 21, 21, 0.1);
                background-color: lightblue;
            }
            #h1 {
                color: rgb(148, 49, 85);
                background-color: lightgreen;
            }
            p {
                color: rgba(0, 0, 0, 1);
                font-style: italic;
                font-family: Arial, sans-serif;
                font-size: 16px;
                text-align: left;
            }
        </style>
    </head>

    <body>
        <div>
            <h1 class="myh1">Hello World</h1>
            <h1 id="h1">Hello World</h1>
            <h1 class="myh1">Hello World</h1>
            <h1>Hello World</h1>
            <h1 class="myh1">Hello World</h1>
        </div>
        <div style="background-color: lightgray;">
            <p class="myh1">This is a paragraph.</p>
            <p style="color: rgba(12, 11, 11, 1);">This is a red paragraph.</p>
            <p style="font-size: 20px;">This is a larger paragraph.</p>
            <p style="text-align: center;">This paragraph is centered.</p>
        </div>
    </body>
</html>
