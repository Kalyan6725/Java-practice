<!DOCTYPE html>
<html>
    <head>
        <title>jS11</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>

    <body>
        <div class="container py-4">
        <button class="btn btn-primary mb-2" onclick="sort()">Sort Data</button>
        <input class="form-control d-inline-block w-auto mb-2" type="text" id="firstName" placeholder="Enter First Name">
        <input class="form-control d-inline-block w-auto mb-2" type="text" id="lastName" placeholder="Enter Last Name">
        <button class="btn btn-success mb-2" onclick="add()">Add</button>
        <h1 id="h1"></h1>
        
        <input class="form-control d-inline-block w-auto mb-2" type="text" id="email" placeholder="Enter Email">
        <input class="form-control d-inline-block w-auto mb-2" type="text" id="name" placeholder="Enter Name">
        <button class="btn btn-success mb-2" onclick="addEmployees()">Add Employees</button>
        <div id="employeeList">
        </div>
        <button class="btn btn-primary mb-2" onclick="deleteById()">DeleteById</button>
        </div>
            
            
        <script>
            var employees = [];
            function getAll() {
                fetch("http://localhost:8080/employees/getAll")
                .then((response)=>{
                return response.json();
                })
                .then(data =>{
                console.log(data);
                employees = data;
                bindEmployees();
                })
                .catch(err=>{
                console.log("There was some problem in contacting the server: "+err)
                });
            }
            function bindEmployees() {
                var employeeList = document.getElementById("employeeList");
                var content = "";
                content += "<table class='table table-striped table-bordered'>";
                content += "<thead class='table-dark'>";
                content += "<tr><th>ID</th><th>Name</th><th>Email</th><th>ProjectsCnt</th></tr>";
                content += "</thead>";
                content += "<tbody>";
                for (var i = 0; i < employees.length; i++) {
                    var projectCount = employees[i].projects ? employees[i].projects.length : 0;
                    content += "<tr>" +
                        "<td>" + employees[i].id + "</td>" +
                        "<td>" + (employees[i].name || "") + "</td>" +
                        "<td>" + (employees[i].email || "") + "</td>" +
                        "<td>" + projectCount + "</td>" +
                        "</tr>";
                }
                content += "</tbody>";
                content += "</table>";
                employeeList.innerHTML = content;
            }
            function addEmployees() {
                var email = document.getElementById("email").value;
                var name = document.getElementById("name").value;
                if(name.trim() === "" || email.trim() === ""){
                        alert("Please enter valid name and email.");
                        return;
                    }
                fetch("http://localhost:8080/employees/add", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ name: name, email: email })
                })
                .then(response => response.json())
                .then(data => {
                    console.log("Employee added:", data);

                    //getAll(); // Refresh the employee list
                    employees.push(data); // Add the new employee to the local array
                    bindEmployees(); // Re-bind the updated employee list
                })
                .catch(err => {
                    console.log("There was some problem in contacting the server: " + err);
                });
            }
            function deleteById() {
                var id = prompt("Enter employee ID to delete:");
                if (id) {
                    fetch(`http://localhost:8080/employees/deleteById/${id}`, {
                        method: "DELETE"
                    })
                    .then(response => {
                        if (response.ok) {
                            console.log("Employee deleted successfully");
                            //getAll(); // Refresh the employee list
                            employees = employees.filter(emp => emp.id != id); // Remove the deleted employee from the local array
                            bindEmployees(); // Re-bind the updated employee list
                        } else {
                            console.log("Failed to delete employee");
                        }
                    })
                    .catch(err => {
                        console.log("There was some problem in contacting the server: " + err);
                    });
                }
            }
            
            var names = [
                { firstName: "SURESH", lastName: "RAINA" },
                { firstName: "MS", lastName: "DHONI" },
                { firstName: "Virat", lastName: "Kohli" },
                { firstName: "Rohit", lastName: "Sharma" }
            ]; //this data will be from server side and we will bind this data to html element using innerHTML property
            function sort(){
                names.sort((a, b) => a.firstName.localeCompare(b.firstName));
                bindData();
            }
            function deleteData(nameToDelete) {
                names = names.filter((item) => item.firstName !== nameToDelete);
                bindData();
            }
            function add() {
                var firstName = document.getElementById("firstName").value;
                var lastName = document.getElementById("lastName").value;
                if(firstName.trim() === "" || lastName.trim() === ""){
                        alert("Please enter valid first name and last name.");
                        return;
                    }
                if (firstName && lastName) {
                    
                    names.push({ firstName: firstName, lastName: lastName });
                    bindData();
                }
            }
            function updateData(index) {
                var newFirstName = document.getElementById("firstName").value;
                var newLastName = document.getElementById("lastName").value;
                if(newFirstName.trim() === "" || newLastName.trim() === ""){
                        alert("Please enter valid first name and last name.");
                        return;
                    }
                if (newFirstName && newLastName) {
                    names[index].firstName = newFirstName;
                    names[index].lastName = newLastName;
                    bindData();
                }
            }
            function bindData() {
                var h1Elements = document.getElementById("h1");
                var content = "";
                content += "<table class='table table-striped table-bordered'>";
                content += "<thead class='table-dark'>";
                content += "<tr><th>First Name</th><th>Last Name</th><th>Actions</th></tr>";
                content += "</thead>";
                content += "<tbody>";
                for (var i = 0; i < names.length; i++) {
                    content+="<tr><td>" + names[i].firstName.toUpperCase() + "</td><td>" + names[i].lastName.toLowerCase() + "</td><td><button class='btn btn-danger btn-sm' onclick='deleteData(\"" + names[i].firstName + "\")'>Delete</button> <button class='btn btn-warning btn-sm' onclick='updateData(" + i + ")'>Update</button></td></tr>";
                }
                content += "</tbody>";
                content += "</table>";
                h1Elements.innerHTML = content;
            }
            window.onload = function() {
                bindData();
                getAll();
            };
        </script>
    </body>
</html>
