<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <!-- Logo/Brand -->
          <div class="text-center mb-4">
            <i class="bi bi-shop text-primary" style="font-size: 3rem;"></i>
            <h3 class="fw-bold mt-2">ShopHub</h3>
            <p class="text-muted">Sign in to your account</p>
          </div>

          <!-- Login Form -->
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <!-- Error Message -->
            <div class="alert alert-danger" *ngIf="errorMessage" role="alert">
              <i class="bi bi-exclamation-triangle me-2"></i>
              {{ errorMessage }}
            </div>

            <!-- Username -->
            <div class="mb-3">
              <label for="username" class="form-label fw-semibold">Username</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-person"></i>
                </span>
                <input 
                  type="text" 
                  class="form-control" 
                  [class.is-invalid]="username?.invalid && username?.touched"
                  id="username" 
                  formControlName="username"
                  placeholder="Enter your username">
              </div>
              <div class="invalid-feedback d-block" *ngIf="username?.invalid && username?.touched">
                <small *ngIf="username?.errors?.['required']">Username is required</small>
                <small *ngIf="username?.errors?.['minlength']">Username must be at least 3 characters</small>
              </div>
            </div>

            <!-- Password -->
            <div class="mb-3">
              <label for="password" class="form-label fw-semibold">Password</label>
              <div class="input-group">
                <span class="input-group-text">
                  <i class="bi bi-lock"></i>
                </span>
                <input 
                  type="password" 
                  class="form-control" 
                  [class.is-invalid]="password?.invalid && password?.touched"
                  id="password" 
                  formControlName="password"
                  placeholder="Enter your password">
              </div>
              <div class="invalid-feedback d-block" *ngIf="password?.invalid && password?.touched">
                <small *ngIf="password?.errors?.['required']">Password is required</small>
                <small *ngIf="password?.errors?.['minlength']">Password must be at least 6 characters</small>
              </div>
            </div>

            <!-- Remember Me & Forgot Password -->
            <div class="d-flex justify-content-between align-items-center mb-4">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="rememberMe">
                <label class="form-check-label" for="rememberMe">
                  Remember me
                </label>
              </div>
              <a href="#" class="text-decoration-none small">Forgot password?</a>
            </div>

            <!-- Login Button -->
            <div class="d-grid mb-3">
              <button 
                type="submit" 
                class="btn btn-primary btn-lg" 
                [disabled]="loading">
                <span *ngIf="!loading">
                  <i class="bi bi-box-arrow-in-right me-2"></i>
                  Sign In
                </span>
                <span *ngIf="loading">
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  Signing in...
                </span>
              </button>
            </div>

            <!-- Divider -->
            <div class="text-center text-muted my-3">
              <small>or continue with</small>
            </div>

            <!-- Social Login -->
            <div class="row g-2 mb-3">
              <div class="col-6">
                <button type="button" class="btn btn-outline-secondary w-100" [disabled]="loading">
                  <i class="bi bi-google me-1"></i> Google
                </button>
              </div>
              <div class="col-6">
                <button type="button" class="btn btn-outline-secondary w-100" [disabled]="loading">
                  <i class="bi bi-facebook me-1"></i> Facebook
                </button>
              </div>
            </div>

            <!-- Sign Up Link -->
            <div class="text-center">
              <small class="text-muted">
                Don't have an account? <a (click)="onSwitchToRegister()" class="text-decoration-none fw-semibold" style="cursor: pointer;">Sign up</a>
              </small>
            </div>
          </form>
        </div>
      </div>

      <!-- Sample Credentials -->
      <div class="alert alert-info mt-3 text-center">
        <small>
          <i class="bi bi-info-circle me-1"></i>
          <strong>Demo:</strong> Use any credentials to login
        </small>
      </div>
    </div>
  </div>
</div>
