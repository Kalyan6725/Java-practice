<div class="container-fluid py-4">
  <div class="row">
    <!-- Filters Sidebar -->
    <div class="col-lg-3 mb-4">
      <app-product-filters 
        [preSelectedCategories]="selectedCategories"
        (filtersChanged)="onFilterChange($event)"></app-product-filters>
    </div>

    <!-- Products Grid -->
    <div class="col-lg-9">
      <!-- Header -->
      <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
          <h3 class="mb-1">All Products</h3>
          <p class="text-muted mb-0">{{ totalProducts }} products found</p>
        </div>
        <app-product-sort (sortChanged)="onSortChange($event)"></app-product-sort>
      </div>

      <!-- Error Message -->
      <div class="alert alert-danger" *ngIf="errorMessage" role="alert">
        <i class="bi bi-exclamation-triangle me-2"></i>
        {{ errorMessage }}
        <button class="btn btn-sm btn-outline-danger ms-3" (click)="loadProducts()">
          Retry
        </button>
      </div>

      <!-- Loading State -->
      <div class="text-center py-5" *ngIf="loading && !errorMessage">
        <div class="spinner-border text-primary" role="status">
          <span class="visually-hidden">Loading...</span>
        </div>
        <p class="mt-3 text-muted">Loading products from database...</p>
      </div>

      <!-- Empty State -->
      <div class="text-center py-5" *ngIf="!loading && !errorMessage && products.length === 0">
        <i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i>
        <h4 class="mt-3">No products found</h4>
        <p class="text-muted">Try adjusting your filters</p>
      </div>

      <!-- Products Grid -->
      <app-product-grid [products]="products" *ngIf="!loading && !errorMessage && products.length > 0"></app-product-grid>

      <!-- Pagination - Coming Soon -->
      <!-- <nav aria-label="Product pagination" class="mt-4" *ngIf="!loading && !errorMessage && products.length > 0">
        <ul class="pagination justify-content-center">
          <li class="page-item disabled">
            <a class="page-link" href="#" tabindex="-1">Previous</a>
          </li>
          <li class="page-item active"><a class="page-link" href="#">1</a></li>
          <li class="page-item"><a class="page-link" href="#">2</a></li>
          <li class="page-item"><a class="page-link" href="#">3</a></li>
          <li class="page-item">
            <a class="page-link" href="#">Next</a>
          </li>
        </ul>
      </nav> -->
    </div>
  </div>
</div>
