<div class="card border-0 shadow-sm sticky-top" style="top: 80px;">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0">Filters</h5>
      <button class="btn btn-sm btn-link text-danger text-decoration-none" (click)="resetFilters()">
        Clear All
      </button>
    </div>

    <!-- Category Filter -->
    <div class="mb-4">
      <h6 class="fw-semibold mb-3">Category</h6>
      <div class="form-check" *ngFor="let category of categories">
        <input 
          class="form-check-input" 
          type="checkbox" 
          [id]="'category-' + category"
          [checked]="selectedCategories.includes(category)"
          (change)="onCategoryChange(category, $event)">
        <label class="form-check-label" [for]="'category-' + category">
          {{ category }}
        </label>
      </div>
    </div>

    <hr>

    <!-- Brand Filter -->
    <div class="mb-4">
      <h6 class="fw-semibold mb-3">Brand</h6>
      <div class="form-check" *ngFor="let brand of brands">
        <input 
          class="form-check-input" 
          type="checkbox" 
          [id]="'brand-' + brand"
          [checked]="selectedBrands.includes(brand)"
          (change)="onBrandChange(brand, $event)">
        <label class="form-check-label" [for]="'brand-' + brand">
          {{ brand }}
        </label>
      </div>
    </div>

    <hr>

    <!-- Price Range Filter -->
    <div class="mb-4">
      <h6 class="fw-semibold mb-3">Price Range</h6>
      <div class="row g-2 mb-2">
        <div class="col-6">
          <input 
            type="number" 
            class="form-control form-control-sm" 
            placeholder="Min" 
            [(ngModel)]="minPrice"
            (ngModelChange)="onPriceChange()">
        </div>
        <div class="col-6">
          <input 
            type="number" 
            class="form-control form-control-sm" 
            placeholder="Max" 
            [(ngModel)]="maxPrice"
            (ngModelChange)="onPriceChange()">
        </div>
      </div>
      <input 
        type="range" 
        class="form-range" 
        min="0" 
        [max]="actualMaxPrice" 
        step="1000" 
        [(ngModel)]="maxPrice"
        (ngModelChange)="onPriceChange()">
      <div class="d-flex justify-content-between small text-muted">
        <span>₹{{ minPrice }}</span>
        <span>₹{{ maxPrice }}</span>
      </div>
    </div>

    <hr>

    <!-- Stock Filter -->
    <div class="mb-4">
      <h6 class="fw-semibold mb-3">Availability</h6>
      <div class="form-check">
        <input 
          class="form-check-input" 
          type="checkbox" 
          id="inStock"
          [(ngModel)]="inStockOnly"
          (ngModelChange)="onStockChange()">
        <label class="form-check-label" for="inStock">
          In Stock Only
        </label>
      </div>
    </div>
  </div>
</div>
