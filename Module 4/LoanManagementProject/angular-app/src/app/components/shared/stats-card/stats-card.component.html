<div class="stats-card">
  <div class="d-flex justify-content-between align-items-start mb-3">
    <div>
      <div class="stats-label">{{ label }}</div>
      <div class="stats-value">{{ value }}</div>
      <div *ngIf="subValue" class="text-secondary small mt-1">
        {{ subValue }}
      </div>
      <div *ngIf="change" class="stats-change" [class.positive]="change.positive" [class.negative]="!change.positive">
        <i class="bi" [ngClass]="change.positive ? 'bi-arrow-up-short' : 'bi-arrow-down-short'"></i> 
        {{ change.value }}
      </div>
    </div>
    <div class="stats-icon bg-{{iconColor}} bg-opacity-10">
      <i class="bi {{icon}} text-{{iconColor}}"></i>
    </div>
  </div>
</div>
