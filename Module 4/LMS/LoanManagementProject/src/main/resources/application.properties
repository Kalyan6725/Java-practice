spring.application.name=LoanManagementProject
# Database Configuration (externalised - override via environment variables in prod)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/loan_management}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# Flyway Migrations
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT Configuration (override the secret in production!)
jwt.secret=${JWT_SECRET:change-this-in-production-to-a-long-random-secret-key-please-32b}
jwt.expiration=${JWT_EXPIRATION:3600000}

# CORS - comma-separated list of allowed frontend origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://localhost:4200}

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html