<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact - Northern Arc</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<!-- Static contact page. No backend endpoint. -->
<body data-area="public" data-active="contact.html">

  <div class="page container">
    <div class="page-head"><div><h1>Contact us</h1><p class="sub">We're here to help with your loans and payments.</p></div></div>

    <div class="row">
      <div class="col">
        <div class="card"><div class="card-body">
          <h3>Send us a message</h3>
          <div id="flash" class="alert alert-success" style="display:none"></div>
          <form id="contactForm">
            <div class="form-row">
              <div class="form-group"><label>Name <span class="req">*</span></label><input class="input" value="Rahul Sharma" required /></div>
              <div class="form-group"><label>Email <span class="req">*</span></label><input class="input" type="email" value="rahul.sharma@example.com" required /></div>
            </div>
            <div class="form-group"><label>Subject</label><input class="input" placeholder="How can we help?" /></div>
            <div class="form-group"><label>Message <span class="req">*</span></label><textarea class="textarea" required>I'd like to know more about home loans.</textarea></div>
            <button type="submit" class="btn btn-primary">Send message</button>
          </form>
        </div></div>
      </div>

      <div class="col" style="max-width:360px">
        <div class="card"><div class="card-body">
          <h3>Head office</h3>
          <dl class="dl">
            <dt>Address</dt><dd>Northern Arc Tower, MG Road, Bengaluru 560001</dd>
            <dt>Phone</dt><dd>+91 80 4000 0000</dd>
            <dt>Email</dt><dd>support&#64;northernarc.example</dd>
            <dt>Hours</dt><dd>Mon&ndash;Sat, 9:00&ndash;18:00</dd>
          </dl>
        </div></div>
        <div class="card mt-2"><div class="card-body">
          <h3>Branches</h3>
          <p class="muted mb-0">Bengaluru &bull; Mumbai &bull; Delhi &bull; Chennai &bull; Hyderabad</p>
        </div></div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>LMS.mockSubmit('contactForm', 'contact.html', 'Thanks! We\'ll get back to you shortly.');</script>
</body>
</html>
