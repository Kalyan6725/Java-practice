<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register - Northern Arc</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<!-- Maps to: POST /api/auth/register
     { customerName, email, password, phone, address, branch }  (role forced to USER) -->
<body data-area="public" data-active="" data-footer="off">

  <div class="auth-wrap">
    <div class="auth-card card" style="max-width:520px">
      <div class="card-body">
        <div class="auth-head">
          <a class="brand" href="index.html" style="justify-content:center">
            <span class="mark"><span class="tri"></span><span class="star">&#10022;</span></span>
            <span class="name"><b>N<span class="dot">O</span>RTHERN</b><span>ARC</span></span>
          </a>
          <h2 class="mt-2 mb-0">Create your account</h2>
          <p class="muted">It only takes a minute</p>
        </div>

        <!-- POST /api/auth/register -->
        <form id="registerForm">
          <div class="form-group">
            <label>Full name <span class="req">*</span></label>
            <input class="input" name="customerName" value="Rahul Sharma" minlength="2" maxlength="100" required />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Email <span class="req">*</span></label>
              <input class="input" type="email" name="email" value="rahul.sharma@example.com" required />
            </div>
            <div class="form-group">
              <label>Phone <span class="req">*</span></label>
              <input class="input" name="phone" value="+919876543210" pattern="^\+?[0-9]{10,15}$" required />
              <div class="hint">10&ndash;15 digits, may start with +</div>
            </div>
          </div>
          <div class="form-group">
            <label>Password <span class="req">*</span></label>
            <input class="input" type="password" name="password" value="password123" minlength="6" required />
            <div class="hint">Minimum 6 characters</div>
          </div>
          <div class="form-group">
            <label>Address <span class="req">*</span></label>
            <input class="input" name="address" value="42, MG Road, Bengaluru" minlength="5" maxlength="255" required />
          </div>
          <div class="form-group">
            <label>Branch <span class="req">*</span></label>
            <select class="select" name="branch" required>
              <option>Bengaluru</option>
              <option>Mumbai</option>
              <option>Delhi</option>
              <option>Chennai</option>
              <option>Hyderabad</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Create account</button>
        </form>

        <p class="text-center mt-2 mb-0" style="font-size:.9rem">
          Already have an account? <a href="login.html">Sign in</a>
        </p>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>
    LMS.mockSubmit('registerForm', 'login.html', 'Account created. Please sign in.');
  </script>
</body>
</html>
