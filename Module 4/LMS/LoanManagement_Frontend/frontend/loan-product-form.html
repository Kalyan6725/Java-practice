<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loan Product Form - Northern Arc</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<!-- Maps to: POST /api/loan-products (ADMIN) or PUT /api/loan-products
     Fields per LoanProductRequest. loanType in PERSONAL|HOME|VEHICLE|EDUCATION|BUSINESS -->
<body data-area="staff" data-active="loan-products-admin.html">

  <div class="page container">
    <div class="breadcrumb"><a href="loan-products-admin.html">Products</a> / New product</div>
    <div class="page-head"><div><h1>New loan product</h1><p class="sub">Configure limits, pricing and penalties.</p></div></div>

    <div class="card" style="max-width:820px"><div class="card-body">
      <form id="productForm">
        <div class="form-row">
          <div class="form-group"><label>Loan code <span class="req">*</span></label><input class="input" name="loanCode" placeholder="e.g. PL-STD" minlength="3" maxlength="20" required /><div class="hint">3&ndash;20 characters, unique</div></div>
          <div class="form-group"><label>Loan name <span class="req">*</span></label><input class="input" name="loanName" placeholder="e.g. Personal Loan" minlength="2" maxlength="100" required /></div>
        </div>
        <div class="form-group"><label>Loan type <span class="req">*</span></label>
          <select class="select" name="loanType" required>
            <option value="PERSONAL">PERSONAL</option><option value="HOME">HOME</option>
            <option value="VEHICLE">VEHICLE</option><option value="EDUCATION">EDUCATION</option>
            <option value="BUSINESS">BUSINESS</option>
          </select>
        </div>

        <hr class="divider" />
        <h3>Amount &amp; tenure</h3>
        <div class="form-row">
          <div class="form-group"><label>Minimum amount (&#8377;) <span class="req">*</span></label><input class="input" type="number" name="minimumAmount" value="50000" min="1" max="10000000" required /></div>
          <div class="form-group"><label>Maximum amount (&#8377;) <span class="req">*</span></label><input class="input" type="number" name="maximumAmount" value="1000000" min="1" max="10000000" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Minimum tenure (months) <span class="req">*</span></label><input class="input" type="number" name="minimumTenure" value="6" min="1" max="600" required /></div>
          <div class="form-group"><label>Maximum tenure (months) <span class="req">*</span></label><input class="input" type="number" name="maximumTenure" value="60" min="1" max="600" required /></div>
        </div>

        <hr class="divider" />
        <h3>Pricing</h3>
        <div class="form-row">
          <div class="form-group"><label>Interest rate (% p.a.) <span class="req">*</span></label><input class="input" type="number" step="0.1" name="interestRate" value="11.5" min="0" max="100" required /></div>
          <div class="form-group"><label>Processing fee (&#8377;) <span class="req">*</span></label><input class="input" type="number" name="processingFee" value="2500" min="0" max="1000000" required /></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Daily penalty rate (%)</label><input class="input" type="number" step="0.01" name="dailyPenaltyRate" value="0.05" min="0" max="100" /></div>
          <div class="form-group"><label>Status</label>
            <select class="select" name="active"><option value="true">Active</option><option value="false">Inactive</option></select>
          </div>
        </div>

        <div class="actions mt-2">
          <button type="submit" class="btn btn-primary btn-lg">Save product</button>
          <a href="loan-products-admin.html" class="btn btn-outline btn-lg">Cancel</a>
        </div>
      </form>
    </div></div>
  </div>

  <script src="js/script.js"></script>
  <script>LMS.mockSubmit('productForm', 'loan-products-admin.html', 'Loan product saved successfully.');</script>
</body>
</html>
