<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile - Northern Arc</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<!-- Maps to: GET /api/customers/me + PUT /api/customers/me
     editable: { customerName, phone, address, branch } -->
<body data-area="customer" data-active="profile.html">

  <div class="page container">
    <div id="flash" class="alert alert-success" style="display:none"></div>
    <div class="page-head"><div><h1>My profile</h1><p class="sub">Manage your personal details.</p></div></div>

    <div class="row">
      <div class="col" style="max-width:320px">
        <div class="card"><div class="card-body text-center">
          <div style="width:80px;height:80px;border-radius:50%;background:var(--space-blue-soft);color:var(--space-blue-dark);
                      display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:800">RS</div>
          <h3 class="mt-2 mb-0">Rahul Sharma</h3>
          <p class="muted">Customer &bull; ID #1042</p>
          <span class="badge badge-info">USER</span>
          <hr class="divider" />
          <dl class="dl" style="grid-template-columns:90px 1fr;text-align:left">
            <dt>Branch</dt><dd>Bengaluru</dd>
            <dt>Member</dt><dd>Since 2025</dd>
            <dt>Loans</dt><dd>3 total</dd>
          </dl>
        </div></div>
      </div>

      <div class="col">
        <div class="card"><div class="card-body">
          <h3>Edit details</h3>
          <form id="profileForm">
            <div class="form-group"><label>Full name <span class="req">*</span></label><input class="input" name="customerName" value="Rahul Sharma" required /></div>
            <div class="form-row">
              <div class="form-group"><label>Email</label><input class="input" type="email" value="rahul.sharma@example.com" disabled /><div class="hint">Email cannot be changed.</div></div>
              <div class="form-group"><label>Phone <span class="req">*</span></label><input class="input" name="phone" value="+919876543210" pattern="^\+?[0-9]{10,15}$" required /></div>
            </div>
            <div class="form-group"><label>Address <span class="req">*</span></label><input class="input" name="address" value="42, MG Road, Bengaluru" required /></div>
            <div class="form-group"><label>Branch <span class="req">*</span></label>
              <select class="select" name="branch">
                <option>Bengaluru</option><option>Mumbai</option><option>Delhi</option><option>Chennai</option><option>Hyderabad</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">Save changes</button>
          </form>
        </div></div>
      </div>
    </div>
  </div>

  <script src="js/script.js"></script>
  <script>LMS.mockSubmit('profileForm', 'profile.html', 'Profile updated successfully.');</script>
</body>
</html>
